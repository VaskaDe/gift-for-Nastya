<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#090910" />
  <title>Gift for Nastya</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>
  <div class="ambient ambient-three"></div>

  <main class="phone-shell" aria-label="Gift birthday picker">
    <section class="screen active" id="lockScreen">
      <div class="status-bar">
        <span id="clock">22:06</span>
        <span>♡ 100%</span>
      </div>
      <div class="lock-content">
        <div class="hero-art" aria-hidden="true">
          <div class="hero-orbit orbit-a"></div>
          <div class="hero-orbit orbit-b"></div>
          <div class="hero-core"><span>22</span></div>
          <div class="spark spark-a"></div>
          <div class="spark spark-b"></div>
          <div class="spark spark-c"></div>
        </div>
        <p class="eyebrow" id="lockEyebrow"></p>
        <h1 id="lockTitle"></h1>
        <p class="subtitle" id="lockSubtitle"></p>
        <div class="system-card">
          <span class="system-label" id="systemLabel"></span>
          <strong id="systemTitle"></strong>
          <small id="systemMeta"></small>
        </div>
        <div class="deprecated-list" id="deprecatedList" aria-label="Статус предыдущих версий"></div>
        <button class="primary-button" id="unlockBtn"></button>
      </div>
    </section>

    <section class="screen" id="homeScreen">
      <div class="status-bar">
        <span id="clockHome">22:06</span>
        <span>GiftOS</span>
      </div>
      <div class="app-header">
        <div class="mini-visual" aria-hidden="true">
          <div class="mini-card mini-card-one"></div>
          <div class="mini-card mini-card-two"></div>
          <div class="mini-card mini-card-three"></div>
        </div>
        <p class="eyebrow" id="homeEyebrow"></p>
        <h2 id="homeTitle"></h2>
        <p id="homeText"></p>
        <div class="quest-panel">
          <span id="questLabel"></span>
          <strong id="questTitle"></strong>
          <small id="questText"></small>
        </div>
      </div>
      <div class="icon-grid" id="categoryGrid"></div>
      <button class="no-gift-button" id="noGiftBtn"></button>
    </section>

    <section class="screen" id="noGiftScreen">
      <div class="status-bar">
        <button class="back-button" id="backFromNoGift">‹</button>
        <span>GiftOS Alert</span>
        <span>!</span>
      </div>
      <div class="empty-state">
        <div class="alert-icon">?</div>
        <p class="eyebrow" id="noGiftEyebrow"></p>
        <h2 id="noGiftTitle"></h2>
        <p id="noGiftText"></p>
        <button class="primary-button" id="returnToPicker"></button>
      </div>
    </section>

    <section class="screen" id="giftsScreen">
      <div class="status-bar">
        <button class="back-button" id="backToHome">‹</button>
        <span id="categoryTitle">Beauty</span>
        <span>♡</span>
      </div>
      <div class="cards" id="giftCards"></div>
    </section>

    <section class="screen" id="successScreen">
      <div class="status-bar">
        <button class="back-button" id="backFromSuccess">‹</button>
        <span>Result</span>
        <span>✓</span>
      </div>
      <div class="success-state">
        <div class="success-orb">✓</div>
        <p class="eyebrow" id="successEyebrow"></p>
        <h2 id="successTitle"></h2>
        <p id="successText"></p>
        <div class="result-card">
          <span id="resultCategory"></span>
          <strong id="resultGift"></strong>
          <small id="resultComment"></small>
        </div>
        <button class="primary-button" id="sendTelegramBtn"></button>
        <button class="ghost-button" id="copyResultBtn"></button>
      </div>
    </section>
  </main>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <aside class="bottom-sheet" id="bottomSheet" aria-live="polite">
    <div class="grabber"></div>
    <p class="eyebrow" id="sheetEyebrow"></p>
    <h3 id="sheetTitle">Выбранный подарок</h3>
    <p id="sheetText"></p>
    <textarea id="comment"></textarea>
    <button class="primary-button" id="confirmBtn"></button>
    <button class="ghost-button" id="closeSheet"></button>
  </aside>

  <div class="toast" id="toast">
    <strong id="toastTitle"></strong>
    <span id="toastText"></span>
  </div>

  <script src="content.js"></script>
  <script src="script.js"></script>
</body>
</html>
